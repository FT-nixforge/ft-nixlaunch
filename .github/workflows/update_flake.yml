name: Update Flake

on:
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  update-flake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Let peter-evans/create-pull-request manage its own credentials.
          # Keeping persist-credentials true (the default) causes a duplicate
          # Authorization header when create-pull-request also configures auth,
          # resulting in a 400 from GitHub.
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Setup cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/nix
          key: ${{ runner.os }}-nix-${{ hashFiles('flake.lock') }}
          restore-keys: |
            ${{ runner.os }}-nix-

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update flake inputs
        run: nix flake update

      - name: Check flake still evaluates
        run: nix flake check --show-trace

      - name: Verify packages and modules still export correctly
        run: |
          nix eval .#packages.x86_64-linux.ft-nixlaunch --apply 'x: "ok"'
          nix eval .#homeModules.default --apply 'x: "ok"'
          nix eval .#overlays.default --apply 'x: "ok"'

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: update-flake-lock
          commit-message: "flake: update flake.lock"
          title: "Update flake.lock"
          body: |
            Automated weekly `flake.lock` update.

            Updated inputs:
            - `nixpkgs`

            Flake check passed — packages, homeModules, and overlays all evaluate correctly.
          labels: |
            dependencies
            automated
          delete-branch: true
